<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APK Injector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #e0e0e0);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 420px; }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 { font-size: 22px; color: var(--tg-theme-button-color, #6c63ff); margin-bottom: 6px; }
        .header p { font-size: 13px; opacity: 0.7; }

        .upload-zone {
            border: 2px dashed var(--tg-theme-hint-color, #444);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            background: var(--tg-theme-secondary-bg-color, #16213e);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--tg-theme-button-color, #6c63ff);
            background: rgba(108, 99, 255, 0.1);
        }
        .upload-zone .icon { font-size: 48px; margin-bottom: 12px; display: block; }
        .upload-zone .text { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .upload-zone .hint { font-size: 12px; opacity: 0.6; }
        .upload-zone .file-info { font-size: 13px; margin-top: 10px; color: var(--tg-theme-button-color, #6c63ff); }

        .progress { display: none; margin: 20px 0; }
        .progress-bar {
            height: 6px;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #6c63ff);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }
        .progress-text { text-align: center; font-size: 13px; margin-top: 8px; opacity: 0.7; }

        .status {
            display: none;
            margin: 20px 0;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
        }
        .status.success { background: rgba(76, 175, 80, 0.15); color: #4CAF50; display: block; }
        .status.error { background: rgba(244, 67, 54, 0.15); color: #f44336; display: block; }
        .status.info { background: rgba(33, 150, 243, 0.15); color: #2196F3; display: block; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            background: var(--tg-theme-button-color, #6c63ff);
            color: var(--tg-theme-button-text-color, #fff);
            margin-top: 12px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.hidden { display: none; }

        .chatid-input-area {
            display: none;
            margin: 16px 0;
        }
        .chatid-input-area label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            opacity: 0.8;
        }
        .chatid-input-area input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--tg-theme-hint-color, #444);
            background: var(--tg-theme-secondary-bg-color, #16213e);
            color: var(--tg-theme-text-color, #e0e0e0);
            font-size: 14px;
            outline: none;
        }
        .chatid-input-area input:focus {
            border-color: var(--tg-theme-button-color, #6c63ff);
        }
        .chatid-hint {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 4px;
        }

        input[type="file"] { display: none; }

        .footer { text-align: center; font-size: 11px; opacity: 0.4; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 APK Injector</h1>
            <p>Upload your APK & get signed injected APK</p>
        </div>

        <div class="upload-zone" id="dropZone">
            <span class="icon">📁</span>
            <div class="text">Click to select APK</div>
            <div class="hint">or drag & drop<br>Max: 2GB • Any Android APK</div>
            <div class="file-info" id="fileInfo"></div>
        </div>
        <input type="file" id="fileInput" accept=".apk">

        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">Uploading to tmpfiles...</div>
        </div>

        <div class="status" id="status"></div>

        <!-- Chat ID input (shown when needed) -->
        <div class="chatid-input-area" id="chatidArea">
            <label>📱 Your Telegram Chat ID:</label>
            <input type="text" id="chatidInput" placeholder="e.g. 123456789" inputmode="numeric">
            <div class="chatid-hint">
                Don't know? Send <code>/start</code> to <b>@userinfobot</b> on Telegram to get your ID
            </div>
            <button class="btn" id="chatidSubmitBtn">✅ Submit & Inject</button>
        </div>

        <button class="btn" id="uploadBtn">📤 Upload & Inject</button>
        <button class="btn hidden" id="newBtn" onclick="resetAll()">🔄 Inject Another</button>

        <div class="footer">Powered by tmpfiles.org + GitHub Actions</div>
    </div>

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        var PA_TRIGGER_URL = 'https://neloy.pythonanywhere.com/trigger';
        var TG_WEBAPP_SCRIPT_LOADED = (typeof Telegram !== 'undefined' && Telegram.WebApp);

        var selectedFile = null;
        var userChatId = null; // Will be filled from multiple sources

        // Try to get chat_id from URL params first (bot can add ?chat_id=XXX)
        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('chat_id')) {
            userChatId = urlParams.get('chat_id');
        }

        // If in Telegram WebView, get from initDataUnsafe
        if (!userChatId && TG_WEBAPP_SCRIPT_LOADED) {
            try {
                var tgUser = Telegram.WebApp.initDataUnsafe;
                if (tgUser && tgUser.user && tgUser.user.id) {
                    userChatId = tgUser.user.id;
                }
            } catch(e) {}
        }

        // Fallback: try from localStorage (saved from previous session)
        if (!userChatId) {
            try {
                var saved = localStorage.getItem('apk_injector_chat_id');
                if (saved) userChatId = saved;
            } catch(e) {}
        }

        var tg = null;
        if (TG_WEBAPP_SCRIPT_LOADED) {
            tg = Telegram.WebApp;
            tg.expand();
            tg.MainButton.hide();
        }

        // ============================================================
        //  DOM REFS
        // ============================================================
        var dropZone = document.getElementById('dropZone');
        var fileInput = document.getElementById('fileInput');
        var fileInfo = document.getElementById('fileInfo');
        var progress = document.getElementById('progress');
        var progressFill = document.getElementById('progressFill');
        var progressText = document.getElementById('progressText');
        var status = document.getElementById('status');
        var uploadBtn = document.getElementById('uploadBtn');
        var newBtn = document.getElementById('newBtn');
        var chatidArea = document.getElementById('chatidArea');
        var chatidInput = document.getElementById('chatidInput');
        var chatidSubmitBtn = document.getElementById('chatidSubmitBtn');

        // ============================================================
        //  EVENT LISTENERS
        // ============================================================
        dropZone.onclick = function() { fileInput.click(); };
        fileInput.onchange = function(e) {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        };

        dropZone.ondragover = function(e) { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = function() { dropZone.classList.remove('dragover'); };
        dropZone.ondrop = function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        };

        // ============================================================
        //  FILE HANDLING
        // ============================================================
        function handleFile(file) {
            if (!file.name.endsWith('.apk')) {
                showStatus('❌ Only .apk files allowed', 'error');
                return;
            }
            selectedFile = file;
            fileInfo.textContent = '📄 ' + file.name + ' (' + (file.size / 1048576).toFixed(1) + ' MB)';
            uploadBtn.disabled = false;
            hideStatus();
            hideChatidInput();
        }

        // ============================================================
        //  UPLOAD & INJECT
        // ============================================================
        uploadBtn.onclick = async function() {
            if (!selectedFile) return;

            if (selectedFile.size > 2147483648) {
                showStatus('❌ File too large (max 2GB)', 'error');
                return;
            }

            uploadBtn.disabled = true;
            showProgress(5);

            try {
                // === STEP 1: Upload to tmpfiles.org ===
                showProgress(10, '📤 Uploading to tmpfiles...');
                var formData = new FormData();
                formData.append('file', selectedFile);

                var uploadResult = await uploadToTmpfiles(formData);
                var fileUrl = uploadResult.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                showProgress(60, '✅ Upload complete! (' + selectedFile.name + ')');

                // === STEP 2: Deliver URL to injection system ===
                showProgress(75, '📡 Sending to injector...');

                // Path A: Telegram WebView — use tg.sendData()
                var sentViaWebView = false;
                if (tg) {
                    try {
                        tg.sendData(JSON.stringify({
                            file_url: fileUrl
                        }));
                        // If tg.sendData succeeds, the WebView closes and this code won't continue
                        // But we set a flag in case it doesn't auto-close
                        sentViaWebView = true;
                    } catch(e) {
                        console.log('tg.sendData failed:', e);
                    }
                }

                // Path B: PA trigger fallback
                var finalChatId = userChatId;

                // If still no chat_id, show prompt
                if (!finalChatId) {
                    showProgress(85, '✋ Need your Chat ID to notify you');
                    showChatidInput(fileUrl);
                    return;
                }

                // We have a chat_id — fire the trigger
                var triggered = await triggerPA(fileUrl, finalChatId);

                if (triggered) {
                    // Save chat_id for next time
                    try { localStorage.setItem('apk_injector_chat_id', finalChatId); } catch(e) {}
                    showProgress(100, '✅ Sent for injection!');
                    showStatus('🎯 APK sent for injection!\n📱 Check the bot @apk_injectorbot for result.\n⏱ Takes 2-10 minutes.', 'success');
                    uploadBtn.classList.add('hidden');
                    newBtn.classList.remove('hidden');
                } else {
                    showStatus('❌ Failed to trigger injection. Try again.', 'error');
                    uploadBtn.disabled = false;
                    hideProgress();
                }

            } catch (err) {
                console.error(err);
                showStatus('❌ ' + err.message, 'error');
                uploadBtn.disabled = false;
                hideProgress();
            }
        };

        // ============================================================
        //  UPLOAD TO TMPFILES
        // ============================================================
        function uploadToTmpfiles(formData) {
            return new Promise(function(resolve, reject) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://tmpfiles.org/api/v1/upload');

                xhr.upload.onprogress = function(e) {
                    if (e.lengthComputable) {
                        var pct = 10 + Math.round((e.loaded / e.total) * 50);
                        showProgress(pct, '📤 Uploading... ' + (e.loaded / 1048576).toFixed(1) + 'MB / ' + (e.total / 1048576).toFixed(1) + 'MB');
                    }
                };

                xhr.onload = function() {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (!data || data.status !== 'success' || !data.data || !data.data.url) {
                            reject(new Error('Upload failed: ' + xhr.responseText));
                            return;
                        }
                        resolve(data.data);
                    } catch(e) {
                        reject(new Error('Upload parse error: ' + xhr.responseText));
                    }
                };

                xhr.onerror = function() { reject(new Error('Upload failed — network error')); };
                xhr.ontimeout = function() { reject(new Error('Upload timed out')); };
                xhr.send(formData);
            });
        }

        // ============================================================
        //  TRIGGER PA FALLBACK
        // ============================================================
        function triggerPA(fileUrl, chatId) {
            return new Promise(function(resolve, reject) {
                // PA /trigger only accepts GET with query params
                var url = PA_TRIGGER_URL 
                    + '?url=' + encodeURIComponent(fileUrl) 
                    + '&cid=' + encodeURIComponent(String(chatId));

                var img = new Image();
                var timeout = setTimeout(function() {
                    img.onload = null;
                    img.onerror = null;
                    // Timeout but we don't know — assume success
                    resolve(true);
                }, 8000);

                img.onload = function() {
                    clearTimeout(timeout);
                    // Image loaded = request went through (= success)
                    resolve(true);
                };
                img.onerror = function() {
                    clearTimeout(timeout);
                    // Even on "error" (since response is not an image), the request still went through
                    // new Image().src sends the request regardless of onerror
                    resolve(true);
                };
                img.src = url;
            });
        }

        // ============================================================
        //  CHAT ID INPUT (fallback when no chat_id known)
        // ============================================================
        function showChatidInput(fileUrl) {
            hideProgress();
            chatidArea.style.display = 'block';
            chatidInput.focus();

            // Store fileUrl for later use
            chatidSubmitBtn._fileUrl = fileUrl;
            chatidSubmitBtn.onclick = async function() {
                var cid = chatidInput.value.trim();
                if (!cid || !/^\d+$/.test(cid)) {
                    showStatus('❌ Please enter a valid numeric Chat ID', 'error');
                    return;
                }
                showProgress(85, '📡 Sending with Chat ID: ' + cid + '...');
                chatidArea.style.display = 'none';
                
                var triggered = await triggerPA(fileUrl, cid);
                if (triggered) {
                    try { localStorage.setItem('apk_injector_chat_id', cid); } catch(e) {}
                    showProgress(100, '✅ Sent for injection!');
                    showStatus('🎯 APK sent for injection!\n📱 Check the bot @apk_injectorbot for result.\n⏱ Takes 2-10 minutes.', 'success');
                    uploadBtn.classList.add('hidden');
                    newBtn.classList.remove('hidden');
                } else {
                    showStatus('❌ Failed. Please try again.', 'error');
                    uploadBtn.disabled = false;
                    hideProgress();
                }
            };
        }

        function hideChatidInput() {
            chatidArea.style.display = 'none';
        }

        // ============================================================
        //  UI HELPERS
        // ============================================================
        function showProgress(pct, text) {
            progress.style.display = 'block';
            progressFill.style.width = pct + '%';
            if (text) progressText.textContent = text;
        }

        function hideProgress() {
            progress.style.display = 'none';
        }

        function showStatus(text, type) {
            status.className = 'status ' + type;
            status.textContent = text;
            status.style.display = 'block';
        }

        function hideStatus() {
            status.style.display = 'none';
        }

        function resetAll() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.textContent = '';
            uploadBtn.disabled = true;
            uploadBtn.classList.remove('hidden');
            newBtn.classList.add('hidden');
            hideStatus();
            hideProgress();
            hideChatidInput();
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (tg) tg.ready();
        });
    </script>
</body>
</html>
